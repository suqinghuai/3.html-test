<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            text-align: center;
            color: white;
        }

        .profile {
            margin-bottom: 40px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .avatar i {
            font-size: 50px;
            color: white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 300;
        }

        .description {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid white;
            background: transparent;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .social-link:hover {
            background: white;
            color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-5px);
        }

        .feature i {
            font-size: 2em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .feature h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .feature p {
            font-size: 0.9em;
            opacity: 0.8;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
            }

            .subtitle {
                font-size: 1em;
            }

            .description {
                font-size: 1em;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1>你好，世界</h1>
            <p class="subtitle">欢迎来到我的个人主页</p>
        </div>

        <p class="description">
            这是一个简洁美观的个人主页，用于展示和分享。
            你可以在这里添加你的个人信息、项目作品或任何想要展示的内容。
        </p>

        <div class="buttons">
            <a href="#" class="btn">
                <i class="fas fa-envelope"></i>
                联系我
            </a>
            <a href="#" class="btn">
                <i class="fas fa-file-alt"></i>
                查看作品
            </a>
            <a href="#" class="btn">
                <i class="fas fa-blog"></i>
                我的博客
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <i class="fas fa-code"></i>
                <h3>前端开发</h3>
                <p>专注于创建美观、响应式的用户界面</p>
            </div>
            <div class="feature">
                <i class="fas fa-paint-brush"></i>
                <h3>UI/UX设计</h3>
                <p>注重用户体验和视觉设计的完美结合</p>
            </div>
            <div class="feature">
                <i class="fas fa-mobile-alt"></i>
                <h3>移动优先</h3>
                <p>确保在所有设备上都有出色的表现</p>
            </div>
        </div>

        <div class="social-links">
            <a href="#" class="social-link">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" class="social-link">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="social-link">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="#" class="social-link">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>
</body>
</html>
