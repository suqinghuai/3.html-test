<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏青淮的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景动画 */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 85%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(255, 107, 107, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%);
            animation: backgroundFloat 20s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            display: flex;
            gap: 30px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .nav a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 主要内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            min-height: 80vh;
        }

        /* 左侧个人信息 */
        .profile-section {
            animation: slideInLeft 1s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .avatar i {
            font-size: 50px;
            color: white;
        }

        .name {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #a0a0ff;
        }

        .info {
            text-align: left;
            margin-top: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .info-item i {
            margin-right: 15px;
            color: #ffd700;
            width: 20px;
        }

        /* 右侧时钟区域 */
        .clock-section {
            animation: slideInRight 1s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .clock-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .digital-clock {
            font-size: 3em;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .date {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .analog-clock {
            width: 200px;
            height: 200px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #00ff88;
            border-radius: 5px;
        }

        .hour-hand {
            width: 4px;
            height: 50px;
            margin-left: -2px;
            background: #ff6b6b;
        }

        .minute-hand {
            width: 3px;
            height: 70px;
            margin-left: -1.5px;
            background: #4ecdc4;
        }

        .second-hand {
            width: 1px;
            height: 80px;
            margin-left: -0.5px;
            background: #ffd93d;
        }

        /* 功能按钮 */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .action-btn {
            padding: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
        }

        .action-btn i {
            font-size: 2em;
        }

        .action-btn.primary {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        }

        .action-btn.success {
            background: linear-gradient(45deg, #00ff88, #00cc66);
        }

        .action-btn.warning {
            background: linear-gradient(45deg, #ffd93d, #ffb700);
        }

        /* 技能展示 */
        .skills {
            margin-top: 60px;
            text-align: center;
        }

        .skills h2 {
            margin-bottom: 30px;
            font-size: 2em;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .skill-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .skill-item:hover {
            transform: translateY(-5px);
        }

        .skill-item i {
            font-size: 2em;
            margin-bottom: 10px;
            color: #ffd700;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .header {
                flex-direction: column;
                gap: 20px;
            }

            .nav {
                gap: 15px;
            }

            .nav a {
                padding: 8px 15px;
                font-size: 0.9em;
            }

            .name {
                font-size: 2em;
            }

            .digital-clock {
                font-size: 2em;
            }

            .analog-clock {
                width: 150px;
                height: 150px;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .profile-card,
            .clock-container {
                padding: 25px;
            }

            .name {
                font-size: 1.8em;
            }

            .digital-clock {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>

    <div class="container">
        <header class="header">
            <div class="logo">苏青淮</div>
            <nav class="nav">
                <a href="#" onclick="document.querySelector('.profile-section').scrollIntoView({behavior: 'smooth'})"><i class="fas fa-home"></i> 首页</a>
                <a href="#" onclick="document.querySelector('.skills').scrollIntoView({behavior: 'smooth'})"><i class="fas fa-user"></i> 关于</a>
                <a href="./projects.html" onclick="navigateTo(event, 'projects.html')"><i class="fas fa-project-diagram"></i> 项目</a>
                <a href="./contact.html" onclick="navigateTo(event, 'contact.html')"><i class="fas fa-envelope"></i> 联系</a>
            </nav>
        </header>

        <main class="main-content">
            <section class="profile-section">
                <div class="profile-card">
                    <div class="avatar">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <h1 class="name">苏青淮</h1>
                    <p class="title">电子信息工程专业 · 大三在读</p>

                    <div class="info">
                        <div class="info-item">
                            <i class="fas fa-university"></i>
                            <span>某大学电子信息工程专业</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-graduation-cap"></i>
                            <span>本科三年级在读</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-code"></i>
                            <span>热爱编程与技术创新</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-heart"></i>
                            <span>探索科技，创造未来</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="clock-section">
                <div class="clock-container">
                    <div class="digital-clock" id="digitalClock">00:00:00</div>
                    <div class="date" id="date"></div>

                    <div class="analog-clock" id="analogClock">
                        <div class="hand hour-hand" id="hourHand"></div>
                        <div class="hand minute-hand" id="minuteHand"></div>
                        <div class="hand second-hand" id="secondHand"></div>
                        <div class="clock-center"></div>
                    </div>
                </div>
            </section>
        </main>

        <div class="action-buttons">
            <a href="./projects.html" class="action-btn" onclick="navigateTo(event, 'projects.html')">
                <i class="fas fa-project-diagram"></i>
                <span>我的项目</span>
            </a>
            <a href="./blog.html" class="action-btn primary" onclick="navigateTo(event, 'blog.html')">
                <i class="fas fa-blog"></i>
                <span>技术博客</span>
            </a>
            <a href="./resume.html" class="action-btn success" onclick="navigateTo(event, 'resume.html')">
                <i class="fas fa-file-alt"></i>
                <span>个人简历</span>
            </a>
            <a href="./contact.html" class="action-btn warning" onclick="navigateTo(event, 'contact.html')">
                <i class="fas fa-envelope"></i>
                <span>联系我</span>
            </a>
        </div>

        <section class="skills">
            <h2>技能专长</h2>
            <div class="skills-grid">
                <div class="skill-item">
                    <i class="fab fa-python"></i>
                    <h3>Python</h3>
                </div>
                <div class="skill-item">
                    <i class="fab fa-html5"></i>
                    <h3>HTML/CSS</h3>
                </div>
                <div class="skill-item">
                    <i class="fab fa-js"></i>
                    <h3>JavaScript</h3>
                </div>
                <div class="skill-item">
                    <i class="fas fa-microchip"></i>
                    <h3>嵌入式</h3>
                </div>
                <div class="skill-item">
                    <i class="fas fa-signal"></i>
                    <h3>信号处理</h3>
                </div>
                <div class="skill-item">
                    <i class="fas fa-database"></i>
                    <h3>数据库</h3>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 数字时钟和日期
        function updateClock() {
            const now = new Date();
            const digitalClock = document.getElementById('digitalClock');
            const dateElement = document.getElementById('date');

            // 数字时钟
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            digitalClock.textContent = `${hours}:${minutes}:${seconds}`;

            // 日期
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            };
            dateElement.textContent = now.toLocaleDateString('zh-CN', options);

            // 模拟时钟
            updateAnalogClock(now);
        }

        function updateAnalogClock(date) {
            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            const secondHand = document.getElementById('secondHand');

            const hours = date.getHours() % 12;
            const minutes = date.getMinutes();
            const seconds = date.getSeconds();

            const hourDegrees = (hours * 30) + (minutes * 0.5);
            const minuteDegrees = minutes * 6;
            const secondDegrees = seconds * 6;

            hourHand.style.transform = `translate(-50%, 0) rotate(${hourDegrees}deg)`;
            minuteHand.style.transform = `translate(-50%, 0) rotate(${minuteDegrees}deg)`;
            secondHand.style.transform = `translate(-50%, 0) rotate(${secondDegrees}deg)`;
        }

        // 每秒更新时钟
        setInterval(updateClock, 1000);
        updateClock(); // 立即调用一次

        // 页面导航函数
        function navigateTo(event, page) {
            event.preventDefault();
            try {
                window.location.href = page;
            } catch (error) {
                console.error('Navigation error:', error);
                alert('页面跳转失败，请检查文件是否存在');
            }
        }

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
